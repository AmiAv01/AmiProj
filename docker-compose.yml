services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ami_app
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - APP_KEY=${APP_KEY}
      - APP_URL=${APP_URL:-http://localhost}
      - LOG_CHANNEL=${LOG_CHANNEL:-stack}
      - DB_CONNECTION=${DB_CONNECTION:-mysql}
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-ami_project}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - BROADCAST_DRIVER=${BROADCAST_DRIVER:-log}
      - CACHE_DRIVER=${CACHE_DRIVER:-file}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - SESSION_DRIVER=${SESSION_DRIVER:-file}
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
    volumes:
      - ./:/app
      - ./storage:/app/storage
      - ./bootstrap/cache:/app/bootstrap/cache
    ports:
      - "9000:9000"
    depends_on:
      - mysql
      - redis
    networks:
      - ami_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: ami_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./storage/logs:/var/log/nginx
    depends_on:
      - app
    networks:
      - ami_network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health/live"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  mysql:
    image: mysql:8.0
    container_name: ami_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ami_project}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_PASSWORD: ${DB_PASSWORD:-password}
      MYSQL_USER: ${DB_USERNAME:-ami_user}
    volumes:
      - ami_db:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d
    ports:
      - "3306:3306"
    networks:
      - ami_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: ami_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - ami_redis:/data
    networks:
      - ami_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes

  # Queue Worker
  queue-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ami_queue_worker
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-ami_project}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - REDIS_HOST=redis
    volumes:
      - ./:/app
    depends_on:
      - mysql
      - redis
    networks:
      - ami_network
    command: php artisan queue:work --tries=3 --timeout=90 --sleep=3
    healthcheck:
      test: ["CMD", "pgrep", "-f", "queue:work"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ami_scheduler
    restart: unless-stopped
    working_dir: /app
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_HOST=mysql
      - DB_PORT=${DB_PORT:-3306}
      - DB_DATABASE=${DB_DATABASE:-ami_project}
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-password}
      - QUEUE_CONNECTION=${QUEUE_CONNECTION:-database}
      - REDIS_HOST=redis
    volumes:
      - ./:/app
    depends_on:
      - mysql
      - redis
    networks:
      - ami_network
    command: php artisan schedule:work
    healthcheck:
      test: ["CMD", "pgrep", "-f", "schedule:work"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  ami_db:
    driver: local
  ami_redis:
    driver: local

networks:
  ami_network:
    driver: bridge
